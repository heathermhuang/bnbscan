# BNBScan + EthScan reverse proxy
# Install: sudo cp infra/nginx.conf /etc/nginx/sites-available/explorers
# Enable:  sudo ln -s /etc/nginx/sites-available/explorers /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d bnbscan.com -d www.bnbscan.com -d ethscan.io -d www.ethscan.io

# ── BNBScan (bnbscan.com) → port 3000 ────────────────────────────────
server {
    listen 80;
    server_name bnbscan.com www.bnbscan.com;

    # Redirect www → apex
    if ($host = www.bnbscan.com) {
        return 301 https://bnbscan.com$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── EthScan (ethscan.io) → port 3001 ─────────────────────────────────
server {
    listen 80;
    server_name ethscan.io www.ethscan.io;

    # Redirect www → apex
    if ($host = www.ethscan.io) {
        return 301 https://ethscan.io$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# NOTE: After running certbot, it will add HTTPS server blocks automatically.
# The http blocks above become permanent redirects to https.
