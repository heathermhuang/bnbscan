services:

  # ── BNBScan.com — Next.js frontend ──────────────────────────────────────────
  - type: web
    name: bnbscan-web
    env: node
    plan: pro               # 2 GB RAM / 1 CPU — $50/mo (upgraded from standard after OOM crashes)
    region: oregon
    rootDir: apps/explorer
    buildCommand: cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @bnbscan/explorer build && cp -r apps/explorer/.next/static apps/explorer/.next/standalone/apps/explorer/.next/static
    startCommand: cd .next/standalone/apps/explorer && node --max-old-space-size=1280 server.js
    healthCheckPath: /api/ping
    autoDeploy: true
    envVars:
      - key: CHAIN
        value: bnb
      - key: DATABASE_URL
        fromDatabase:
          name: bnbscan-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bnbscan-redis
          property: connectionString
      - key: BNB_RPC_URL
        sync: false         # Chainstack BSC endpoint — set in Render dashboard
      - key: MORALIS_API_KEY
        sync: false         # moralis.io — free tier sufficient to start
      - key: NEXT_PUBLIC_PEER_URL
        value: https://ethscan.io
      - key: NODE_ENV
        value: production
      - key: DB_POOL_SIZE
        value: "3"
      # NOTE: --max-old-space-size is set in startCommand (not NODE_OPTIONS)
      # so it only applies at runtime, not during build (which needs full RAM)
      - key: HOSTNAME
        value: "0.0.0.0"         # Required for standalone output — binds to all interfaces

  # ── EthScan.io — Next.js frontend ───────────────────────────────────────────
  - type: web
    name: ethscan-web
    env: node
    plan: pro               # 2 GB RAM / 1 CPU — $50/mo (upgraded from standard after OOM crashes)
    region: oregon
    rootDir: apps/explorer
    buildCommand: cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @bnbscan/explorer build && cp -r apps/explorer/.next/static apps/explorer/.next/standalone/apps/explorer/.next/static
    startCommand: cd .next/standalone/apps/explorer && node --max-old-space-size=1280 server.js
    healthCheckPath: /api/ping
    autoDeploy: true
    envVars:
      - key: CHAIN
        value: eth
      - key: ETH_DATABASE_URL
        fromDatabase:
          name: ethscan-db
          property: connectionString
      - key: ETH_RPC_URL
        sync: false         # Chainstack ETH endpoint — set in Render dashboard
      - key: MORALIS_API_KEY
        sync: false
      - key: NEXT_PUBLIC_PEER_URL
        value: https://bnbscan.com
      - key: NODE_ENV
        value: production
      - key: DB_POOL_SIZE
        value: "3"            # Limit pool to reduce connection pressure during traffic spikes
      # NOTE: --max-old-space-size is set in startCommand (not NODE_OPTIONS)
      - key: HOSTNAME
        value: "0.0.0.0"         # Required for standalone output — binds to all interfaces

  # ── BNB Chain Indexer ────────────────────────────────────────────────────────
  - type: worker
    name: bnbscan-indexer
    env: node
    plan: standard          # 1 GB RAM / 1 CPU — $25/mo
    region: oregon
    rootDir: apps/indexer
    buildCommand: cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @bnbscan/chain-config build && pnpm --filter @bnbscan/db build && pnpm --filter @bnbscan/indexer build
    startCommand: node dist/index.js
    envVars:
      - key: CHAIN
        value: bnb
      - key: DATABASE_URL
        fromDatabase:
          name: bnbscan-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bnbscan-redis
          property: connectionString
      - key: BNB_RPC_URL
        sync: false
      - key: START_BLOCK
        sync: false         # Leave unset to resume from DB max (default 38000000)
      - key: DB_POOL_SIZE
        value: "3"          # Keep well under basic-1gb's ~25 max_connections
      - key: NODE_ENV
        value: production

  # ── Ethereum Indexer ─────────────────────────────────────────────────────────
  - type: worker
    name: eth-indexer
    env: node
    plan: standard          # 1 GB RAM / 1 CPU — $25/mo (upgraded from starter after OOM crashes, exit 134)
    region: oregon
    rootDir: apps/indexer
    buildCommand: cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @bnbscan/chain-config build && pnpm --filter @bnbscan/db build && pnpm --filter @bnbscan/indexer build
    startCommand: node dist/index.js
    envVars:
      - key: CHAIN
        value: eth
      - key: ETH_DATABASE_URL
        fromDatabase:
          name: ethscan-db
          property: connectionString
      - key: ETH_RPC_URL
        sync: false
      - key: START_BLOCK
        sync: false         # Leave unset to start from chain tip
      - key: DB_POOL_SIZE
        value: "3"          # Keep well under basic-1gb's ~25 max_connections
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=768"  # GC before 1GB OOM kill

  # ── Redis (shared BullMQ queue for BNB indexer) ───────────────────────────
  - type: redis
    name: bnbscan-redis
    plan: starter           # 25 MB — sufficient for BullMQ job queues — $10/mo
    ipAllowList: []         # private networking only

databases:

  # ── BNB Chain PostgreSQL ──────────────────────────────────────────────────
  # BNB grows ~12-15 GB/month — pro-1gb holds ~2 months before upgrade
  - name: bnbscan-db
    databaseName: bnbscan
    user: bnbscan
    plan: basic-1gb         # 1 GB RAM, 25 GB storage — $20/mo
                            # Upgrade to pro-4gb when storage fills

  # ── Ethereum PostgreSQL ──────────────────────────────────────────────────
  # ETH grows ~6-8 GB/month — basic-1gb holds for 3-4 months
  - name: ethscan-db
    databaseName: ethscan
    user: ethscan
    plan: basic-1gb         # 1 GB RAM, 25 GB storage — $20/mo
