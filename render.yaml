services:
  - type: web
    name: bnbscan-web
    env: node
    plan: standard
    rootDir: apps/web
    buildCommand: cd ../.. && pnpm install && pnpm --filter @bnbscan/web build && psql $DATABASE_URL -f schema.sql
    startCommand: pnpm start
    healthCheckPath: /api/v1/stats
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bnbscan-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bnbscan-redis
          property: connectionString
      - key: BNB_RPC_URL
        sync: false   # Set to your Ankr BNB endpoint: https://rpc.ankr.com/bsc/<YOUR_KEY>
      - key: NODE_ENV
        value: production

  - type: worker
    name: bnbscan-indexer
    env: node
    plan: standard
    rootDir: apps/indexer
    buildCommand: cd ../.. && pnpm install && pnpm --filter @bnbscan/indexer build
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bnbscan-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bnbscan-redis
          property: connectionString
      - key: BNB_RPC_URL
        sync: false   # Set to your Ankr BNB endpoint: https://rpc.ankr.com/bsc/<YOUR_KEY>
      - key: START_BLOCK
        sync: false   # Block to start indexing from on a fresh DB (leave unset to use DB max or 38000000)
      - key: NODE_ENV
        value: production

  - type: redis
    name: bnbscan-redis
    plan: starter
    ipAllowList: []

databases:
  - name: bnbscan-db
    databaseName: bnbscan
    user: bnbscan
    plan: standard
